name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build app
        run: ./GrafanaScope/scripts/build.sh

      - name: Package zip
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCH="$(uname -m)"
          ZIP="Grafana-Scope-${VERSION}-macos-${ARCH}.zip"
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent "build/Grafana Scope.app" "dist/${ZIP}"
          echo "ZIP_NAME=${ZIP}" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ env.ZIP_NAME }}
          generate_release_notes: true
