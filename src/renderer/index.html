<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'" />
    <title>Grafana Alerts</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="menu.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="header">
        <div>
          <h1>Grafana Alerts</h1>
          <p id="last-updated" class="subtitle">Loading…</p>
        </div>
        <div class="header-actions">
          <button id="settings-btn" class="icon-btn" title="Settings">⚙</button>
          <button id="refresh-btn" class="icon-btn" title="Refresh">↻</button>
        </div>
      </header>

      <div class="panel-scroll" id="alerts-view">
        <main class="panel active">
          <div id="alerts-summary" class="summary"></div>
          <div id="alerts-list" class="alerts-list"></div>
        </main>
      </div>

      <div id="settings-overlay" class="settings-overlay" hidden>
        <div class="menu-shell menu-shell--embedded">
          <div id="view-root" class="menu-view active">
            <div class="menu-toolbar">
              <button type="button" class="menu-back-btn" id="menu-close">← Back</button>
              <span class="menu-toolbar-title">Settings</span>
            </div>
            <button type="button" class="menu-item" data-nav="instances">
              <span class="menu-icon">▦</span>
              <span class="menu-label">Instances</span>
              <span class="menu-chevron">›</span>
            </button>
            <button type="button" class="menu-item" data-nav="interval">
              <span class="menu-icon">◷</span>
              <span class="menu-label">Refresh interval</span>
              <span class="menu-chevron">›</span>
            </button>
            <div class="menu-separator"></div>
            <p id="menu-version" class="menu-muted">Grafana Menubar</p>
            <div class="menu-separator"></div>
            <button type="button" class="menu-item" id="menu-refresh">
              <span class="menu-icon">↻</span>
              <span class="menu-label">Refresh now</span>
            </button>
            <div class="menu-separator"></div>
            <button type="button" class="menu-item danger" id="menu-quit">
              <span class="menu-icon">⏻</span>
              <span class="menu-label">Quit</span>
            </button>
          </div>

          <div id="view-instances" class="menu-view">
            <div class="menu-toolbar">
              <button type="button" class="menu-back-btn" data-back>← Back</button>
              <span class="menu-toolbar-title">Instances</span>
            </div>
            <div id="instances-menu-list" class="instances-menu-list"></div>
            <button type="button" class="menu-item accent" id="add-instance-btn">
              <span class="menu-icon">＋</span>
              <span class="menu-label">Add instance</span>
            </button>
          </div>

          <div id="view-interval" class="menu-view">
            <div class="menu-toolbar">
              <button type="button" class="menu-back-btn" data-back>← Back</button>
              <span class="menu-toolbar-title">Refresh interval</span>
            </div>
            <div class="menu-form">
              <label>
                Seconds between refreshes
                <input id="refresh-interval" type="number" min="15" max="3600" value="60" />
              </label>
              <button type="button" class="menu-action" id="save-interval-btn">Save</button>
              <p id="interval-status" class="menu-status"></p>
            </div>
          </div>

          <div id="view-instance-form" class="menu-view">
            <div class="menu-toolbar">
              <button type="button" class="menu-back-btn" data-back>← Back</button>
              <span class="menu-toolbar-title" id="form-toolbar-title">Instance</span>
            </div>
            <form id="instance-form" class="menu-form">
              <input type="hidden" id="edit-id" />
              <label>
                Name
                <input id="instance-name" type="text" placeholder="Production" required />
              </label>
              <label>
                URL
                <input id="instance-url" type="url" placeholder="https://grafana.example.com" required />
              </label>
              <label>
                API Token
                <input id="instance-token" type="password" placeholder="glsa_..." required />
              </label>
              <label class="menu-checkbox">
                <input id="instance-enabled" type="checkbox" checked />
                Enabled
              </label>
              <label>
                Color
                <div id="instance-color-picker" class="color-picker"></div>
                <input id="instance-color" type="hidden" value="#FF453A" />
              </label>
              <div class="menu-form-actions">
                <button type="button" class="menu-secondary" id="test-btn">Test</button>
                <button type="submit" class="menu-action">Save</button>
              </div>
              <button type="button" class="menu-danger-link" id="delete-instance-btn" hidden>Delete instance</button>
              <p id="form-status" class="menu-status"></p>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
    <script src="settings.js"></script>
  </body>
</html>
